          <h2>Privacy Policy</h2>

          <p><strong>Light Junkie</strong> is built with privacy in mind. Your location data and preferences are processed <strong>on your device</strong>. We do <strong>not</strong> collect, transmit, or store personal data on our servers.</p>

          <ul>
            <li>We do not collect personal information, usage analytics, or device identifiers.</li>
            <li>We do not run ads and do not use third-party tracking SDKs.</li>

        features: `

            <h2>Funkcje</h2>

              <li><strong>Wschód i zachód słońca</strong> — dokładne godziny dla Twojej lokalizacji lub dowolnego miasta na świecie.</li>
              <li><strong>Świt i zmierzch</strong> — zobacz czasy zmierzchu cywilnego dla pełnego obrazu.</li>
              <li><strong>Piękny łuk słońca</strong> — wizualizacja pozycji słońca w ciągu dnia z eleganckim wyświetlaczem łuku.</li>

              <li><strong>Wiele lokalizacji</strong> — śledź czasy słońca dla ulubionych miast na świecie.</li>

        privacy: `
          <h2>Polityka prywatności</h2>
          <p><strong>Data wejścia w życie:</strong> 21 grudnia 2025</p>
          <p><strong>Light Junkie</strong> została stworzona z myślą o prywatności. Twoje dane lokalizacyjne i preferencje są przetwarzane <strong>na urządzeniu</strong>. <strong>Nie</strong> zbieramy, nie przesyłamy ani nie przechowujemy danych osobowych na naszych serwerach.</p>

          <ul>
            <li>Nie zbieramy danych osobowych, analityki użycia ani identyfikatorów urządzeń.</li>

            <li>Twoja aktualna lokalizacja GPS jest używana tylko do obliczania czasów wschodu/zachodu i jest przechowywana lokalnie na urządzeniu.</li>

          <p>Jeśli masz włączony iCloud, zapisane lokalizacje (nazwy miast i współrzędne) są synchronizowane między urządzeniami przez usługę iCloud firmy Apple. Dane te są chronione przez Twoje Apple ID i zabezpieczenia iCloud.</p>

    function localizeContent() {
      const lang = navigator.language || "en";
      const shortLang = lang.toLowerCase();
      const fallback = translations["en"];

      const t =
        translations[shortLang] ||
        translations[shortLang.split("-")[0]] ||
        fallback;

      document.getElementById("headline").textContent = t.headline;
      document.getElementById("appstoreButton").textContent = t.download;
      document.getElementById("supportLink").textContent = t.support;
      document.getElementById("featuresContent").innerHTML = t.features;
      document.getElementById("privacyContent").innerHTML = t.privacy;
    }

    document.addEventListener("DOMContentLoaded", localizeContent);
  </script>
  <style>

  <script>
    const track = document.getElementById('carouselTrack');
    const dots = document.querySelectorAll('.dot');
    const slideCount = 3;
    let index = 0;
    let intervalId;
    let isPaused = false;

    function updateDots(activeIndex) {
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === activeIndex);
      });
    }

    function goToSlide(i) {
      index = i;
      track.style.transform = `translateX(-${index * 100}%)`;
      updateDots(index);
    }

    function nextSlide() {
      if (isPaused) return;
      const next = (index + 1) % slideCount;
      goToSlide(next);
    }

    function startCarousel() {
      intervalId = setInterval(nextSlide, 5000);
    }

    function stopCarousel() {
      clearInterval(intervalId);
    }

    // Dots interaction
    dots.forEach((dot, i) => {
      dot.addEventListener('click', () => {
        stopCarousel();
        goToSlide(i);
        startCarousel();
      });
    });

    // Pause on hover
    const wrapper = document.querySelector('.carousel-wrapper');
    wrapper.addEventListener('mouseenter', () => { isPaused = true; stopCarousel(); });
    wrapper.addEventListener('mouseleave', () => { isPaused = false; startCarousel(); });

    // Touch swipe support
    let touchStartX = 0;
    let touchEndX = 0;

    wrapper.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
      stopCarousel();
    }, { passive: true });

    wrapper.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
      startCarousel();
    }, { passive: true });

    function handleSwipe() {
      const diff = touchStartX - touchEndX;
      if (Math.abs(diff) > 50) {
        if (diff > 0 && index < slideCount - 1) {
          goToSlide(index + 1);
        } else if (diff < 0 && index > 0) {
          goToSlide(index - 1);
        }
      }
    }

    // Start
    startCarousel();
  </script>
